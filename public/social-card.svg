<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Real PM Jobs social card</title>
  <desc id="desc">Editorial social card for Real PM Jobs.</desc>
  <rect width="1200" height="630" fill="#f8f7f4" />
  <rect x="32" y="32" width="1136" height="566" rx="18" fill="#fcfbf9" stroke="#d6d3d1" stroke-width="2" />
  <g fill="#78716c" font-family="'SF Pro Text', 'Segoe UI', Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="6">
    <text x="84" y="110">REAL PM JOBS</text>
  </g>
  <g fill="#1c1917" font-family="Iowan Old Style, 'Palatino Linotype', Georgia, serif" font-size="72">
    <text x="84" y="220">Most PM jobs</text>
    <text x="84" y="304">aren't actually</text>
    <text x="84" y="388">PM jobs.</text>
  </g>
  <g fill="#44403c" font-family="'SF Pro Text', 'Segoe UI', Arial, sans-serif" font-size="30">
    <text x="84" y="474">Outcome ownership.</text>
    <text x="84" y="520">Decision rights.</text>
    <text x="84" y="566">Discovery capacity.</text>
  </g>
  <line x1="812" y1="120" x2="1080" y2="120" stroke="#d6d3d1" stroke-width="2" />
  <line x1="812" y1="250" x2="1080" y2="250" stroke="#d6d3d1" stroke-width="2" />
  <line x1="812" y1="380" x2="1080" y2="380" stroke="#d6d3d1" stroke-width="2" />
  <g fill="#1c1917" font-family="Iowan Old Style, 'Palatino Linotype', Georgia, serif" font-size="28">
    <text x="812" y="105">Editorial job board</text>
    <text x="812" y="235">Higher bar, fewer roles</text>
    <text x="812" y="365">Scope over title</text>
  </g>
</svg>
