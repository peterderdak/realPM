<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Real PM Jobs social card</title>
  <desc id="desc">Social card for Real PM Jobs.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1020" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
    <radialGradient id="glowA" cx="16%" cy="10%" r="58%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="88%" cy="8%" r="42%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.26" />
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glowA)" />
  <rect width="1200" height="630" fill="url(#glowB)" />
  <rect x="36" y="36" width="1128" height="558" rx="34" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.12)" stroke-width="2" />

  <g font-family="'SF Pro Display', 'SF Pro Text', 'Segoe UI Variable', 'Segoe UI', Arial, sans-serif">
    <rect x="82" y="86" width="220" height="42" rx="21" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" />
    <text x="110" y="114" font-size="18" font-weight="700" letter-spacing="3.6" fill="#d4d4d8">REAL PM JOBS</text>

    <text x="82" y="220" font-size="84" font-weight="700" letter-spacing="-5.2" fill="#ffffff">Most PM jobs</text>
    <text x="82" y="310" font-size="84" font-weight="700" letter-spacing="-5.2" fill="#ffffff">aren't actually</text>
    <text x="82" y="400" font-size="84" font-weight="700" letter-spacing="-5.2" fill="#ffffff">PM jobs.</text>

    <text x="82" y="482" font-size="30" font-weight="500" fill="#cbd5e1">
      A tighter board for PM roles with real scope.
    </text>
  </g>

  <g font-family="'SF Pro Display', 'SF Pro Text', 'Segoe UI Variable', 'Segoe UI', Arial, sans-serif">
    <rect x="770" y="124" width="324" height="94" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" />
    <text x="808" y="160" font-size="18" font-weight="700" letter-spacing="2.8" fill="#94a3b8">OUTCOME OWNERSHIP</text>
    <text x="808" y="194" font-size="24" font-weight="500" fill="#ffffff">Scope first. Title second.</text>

    <rect x="770" y="244" width="324" height="94" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" />
    <text x="808" y="280" font-size="18" font-weight="700" letter-spacing="2.8" fill="#94a3b8">DECISION RIGHTS</text>
    <text x="808" y="314" font-size="24" font-weight="500" fill="#ffffff">Evidence over artifacts.</text>

    <rect x="770" y="364" width="324" height="94" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" />
    <text x="808" y="400" font-size="18" font-weight="700" letter-spacing="2.8" fill="#94a3b8">DISCOVERY CAPACITY</text>
    <text x="808" y="434" font-size="24" font-weight="500" fill="#ffffff">Fewer listings. Clearer signal.</text>
  </g>
</svg>
