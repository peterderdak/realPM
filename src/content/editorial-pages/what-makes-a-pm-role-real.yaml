title: What Makes a PM Role Real?
slug: what-makes-a-pm-role-real
description: Practical guidance on what separates real PM roles from backlog administration, delivery coordination, and title inflation.
summary: The real distinction is not roadmap versus backlog. It is whether the role owns outcomes, has decision rights, and can run enough discovery to improve the work.
draft: false
sections:
  - title: Accountability over artifacts
    body: Real product roles are defined by what they own, what they can decide, and what outcomes they are expected to move.
  - title: Decision rights matter
    body: A PM role without authority over prioritization and tradeoffs is usually operating as support for someone else's decisions.
  - title: Discovery is part of the job
    body: If the role has no room to investigate, learn, and change course, the title is likely carrying more weight than the mandate.
